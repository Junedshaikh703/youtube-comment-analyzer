stages:
  preprocess:
    cmd: python data_preprocessing.py
    deps:
    - data/raw/experiment_dataset.csv
    - data_preprocessing.py
    outs:
    - data/processed/experiment_dataset_cleaned.csv
  inference:
    cmd: python main.py
    deps:
    - data/processed/experiment_dataset_cleaned.csv
    - main.py
    - src
    params:
    - llm.model_name
    - llm.batch_size
    - llm.summary_temperature
    - llm.reply_temperature
  select_best_model:
    cmd: python src/select_best_model.py
    deps:
    - src/select_best_model.py
    outs:
    - best_model_config.json