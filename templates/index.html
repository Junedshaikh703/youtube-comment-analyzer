<!DOCTYPE html>
<html>

<head>

<title>YouTube Comment Analyzer</title>

<style>

body{
    font-family: Arial;
    background:#f5f5f5;
    margin:0;
}

.container{
    width:900px;
    margin:auto;
    margin-top:40px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

textarea{
    width:100%;
    height:150px;
    padding:10px;
}

button{
    padding:10px 25px;
    background:#007bff;
    border:none;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.result{
    margin-top:30px;
}

.summary-box{
    background:#eef6ff;
    padding:15px;
    border-radius:5px;
}

.reply-box{
    background:#f8f8f8;
    padding:10px;
    border-radius:5px;
    margin-top:5px;
}

</style>

</head>

<body>

<div class="container">

<h2>YouTube Comment Analyzer</h2>

<form method="POST">

<p>Enter comments (one per line)</p>

<textarea name="comments"></textarea>

<br><br>

<button type="submit">Analyze</button>

</form>


{% if summary %}

<div class="result">

<h3>Summary</h3>

<div class="summary-box">
{{ summary }}
</div>

<h3>Replies</h3>

{% for r in replies %}

<div class="reply-box">
{{ r }}
</div>

{% endfor %}

</div>

{% endif %}

</div>

</body>
</html>
