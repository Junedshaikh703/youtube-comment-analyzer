<!DOCTYPE html>
<html>
<head>
<title>YouTube Comment Analyzer</title>

<style>
body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    margin:0;
}

.container{
    max-width:700px;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0px 10px 30px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#4f46e5;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#4338ca;
}

.result{
    margin-top:30px;
}

.summary-box{
    background:#eef2ff;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
}

.card{
    background:#f9fafb;
    padding:15px;
    border-radius:8px;
    margin-bottom:15px;
}

.loader{
    display:none;
    text-align:center;
    margin-top:20px;
}

</style>

<script>
function showLoader(){
    document.getElementById("loader").style.display = "block";
}
</script>

</head>

<body>

<div class="container">

<h2>🎥 YouTube Comment Analyzer</h2>

<form method="POST" onsubmit="showLoader()">

<p>Paste YouTube Video URL</p>

<input type="text" name="video_url" placeholder="Enter YouTube link..." required>

<br><br>

<button type="submit">Analyze</button>

</form>

<div id="loader" class="loader">
<p>⏳ Processing... Please wait</p>
</div>

{% if summary %}

<div class="result">

<h3>📊 Summary</h3>

<div class="summary-box">
{{ summary }}
</div>

<h3>💬 Comments & Replies</h3>

{% for comment, reply in pairs %}

<div class="card">

<b>Comment:</b>
<p>{{ comment }}</p>

<b>Reply:</b>
<p>{{ reply }}</p>

</div>

{% endfor %}

</div>

{% endif %}

</div>

</body>
</html>
